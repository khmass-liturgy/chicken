<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>🐔 닭 질병 진단 커뮤니티</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;background:#F0F7F0}
#root{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#F0F7F0}

/* ── 공통 ── */
.btn{padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
.btn:active{opacity:.85}
.btn-green{background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;box-shadow:0 4px 14px rgba(46,125,50,.28)}
.btn-blue{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;box-shadow:0 4px 14px rgba(13,71,161,.25)}
.btn-red{background:#FFEBEE;color:#C62828;border:1.5px solid #FFCDD2}
.btn-gray{background:#F5F5F5;color:#616161;border:1.5px solid #E0E0E0}
.btn:disabled{background:#BDBDBD;box-shadow:none;cursor:not-allowed;opacity:.7}
.inp{width:100%;padding:12px 14px;border:2px solid #E0E0E0;border-radius:12px;font-size:15px;font-family:inherit;outline:none;color:#212121;transition:border-color .2s;background:#fff}
.inp:focus{border-color:#2E7D32}
.lbl{font-size:13px;font-weight:600;color:#37474F;margin-bottom:6px;display:block}
.err{color:#C62828;font-size:13px;margin-top:8px;text-align:center}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1.5px solid #F0F0F0;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.chip-green{background:#E8F5E9;color:#2E7D32}
.chip-blue{background:#E8EAF6;color:#1565C0}
.chip-orange{background:#FFF3E0;color:#E65100}
.chip-red{background:#FFEBEE;color:#C62828}
.chip-gray{background:#F5F5F5;color:#616161}

/* ── 로딩 ── */
.loading-full{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(155deg,#071a0c,#1B5E20)}
.loading-icon{font-size:64px}
.loading-txt{color:#fff;font-size:16px;margin-top:16px}
.spin{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;justify-content:center;gap:10px}

/* ── 인증 화면 ── */
.auth-screen{min-height:100vh;background:linear-gradient(155deg,#071a0c 0%,#0f3a1a 35%,#1B5E20 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{font-size:64px}
.auth-logo-title{color:#fff;font-size:24px;font-weight:900;margin-top:12px}
.auth-logo-sub{color:#81C784;font-size:13px;margin-top:6px}
.auth-card{background:#fff;border-radius:24px;padding:28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.auth-tabs{display:flex;background:#F5F5F5;border-radius:10px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:8px;border:none;background:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#9E9E9E;transition:all .2s}
.auth-tab.active{background:#fff;color:#1B5E20;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.form-row{margin-bottom:14px}
.role-select{display:flex;gap:10px;margin-bottom:14px}
.role-opt{flex:1;padding:12px 8px;border:2px solid #E0E0E0;border-radius:12px;text-align:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.role-opt.sel{border-color:#1B5E20;background:#E8F5E9}
.role-opt-icon{font-size:28px}
.role-opt-label{font-size:13px;font-weight:600;margin-top:4px}

/* ── 대기/거절 ── */
.status-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:#F0F7F0}
.status-icon{font-size:72px}
.status-title{font-size:22px;font-weight:700;margin-top:20px;color:#212121}
.status-desc{color:#616161;font-size:14px;margin-top:12px;line-height:1.8;max-width:300px}

/* ── 상단 헤더 ── */
.top-hdr{background:#1B5E20;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.app-name{color:#fff;font-weight:900;font-size:16px}
.user-info{display:flex;align-items:center;gap:8px}
.user-name-chip{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600}

/* ── 탭 바 ── */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #E8F5E9;position:sticky;top:52px;z-index:99;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:10px 6px;text-align:center;cursor:pointer;border:none;background:none;font-family:inherit;position:relative;-webkit-tap-highlight-color:transparent}
.tab-icon{font-size:20px;display:block}
.tab-label{font-size:10px;font-weight:600;color:#9E9E9E;margin-top:2px;display:block;white-space:nowrap}
.tab.active .tab-label{color:#1B5E20}
.tab-indicator{position:absolute;bottom:0;left:15%;right:15%;height:2.5px;background:#1B5E20;border-radius:2px;display:none}
.tab.active .tab-indicator{display:block}
.tab-badge{position:absolute;top:4px;right:calc(50% - 20px);background:#E53935;color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;font-weight:700}

/* ── 컨텐츠 ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 80px}

/* ── 게시글 카드 ── */
.post-card{background:#fff;border-radius:16px;padding:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1.5px solid #F0F0F0;margin-bottom:10px;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.post-card:active{transform:scale(.98)}
.post-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.post-title{font-weight:700;font-size:15px;color:#212121;margin-bottom:6px;line-height:1.4}
.post-preview{color:#616161;font-size:13px;line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.post-date{color:#9E9E9E;font-size:11px}
.post-comments{color:#9E9E9E;font-size:12px}
.target-vet{background:#E3F2FD;color:#1565C0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:4px}

/* ── 수의사 카드 ── */
.vet-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1.5px solid #E8EAF6;margin-bottom:10px}
.vet-name{font-weight:700;font-size:15px;color:#1A237E}
.vet-clinic{color:#616161;font-size:13px;margin-top:3px}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:calc(50% - 284px);background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;border:none;border-radius:28px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(46,125,50,.4);z-index:90;font-family:inherit;display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent}
.fab:active{opacity:.87;transform:scale(.97)}
@media(max-width:600px){.fab{right:16px}}

/* ── 오버레이 화면 ── */
.overlay{position:fixed;inset:0;max-width:600px;margin:0 auto;background:#F0F7F0;z-index:150;display:flex;flex-direction:column;overflow:hidden}
.ov-hdr{background:#1B5E20;display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.ov-hdr.blue{background:#0D47A1}
.ov-hdr.admin{background:#37474F}
.ov-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1}
.ov-title{color:#fff;font-weight:700;font-size:15px;flex:1}
.ov-scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* ── 게시글 상세 ── */
.post-detail-title{font-size:20px;font-weight:700;color:#212121;line-height:1.4;margin-bottom:12px}
.post-detail-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.post-detail-content{color:#37474F;font-size:14px;line-height:1.85;white-space:pre-wrap;margin-bottom:20px}
.divider{height:1px;background:#F0F0F0;margin:16px 0}
.comment-count{font-weight:700;font-size:14px;color:#1B5E20;margin-bottom:12px}
.comment-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;border:1.5px solid #F0F0F0}
.comment-author{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.comment-name{font-weight:700;font-size:13px;color:#212121}
.comment-date{font-size:11px;color:#9E9E9E}
.comment-content{color:#37474F;font-size:14px;line-height:1.7;white-space:pre-wrap}
.comment-input-area{position:sticky;bottom:0;background:#fff;padding:12px 16px;border-top:1.5px solid #E0E0E0;display:flex;gap:10px;align-items:flex-end}
.comment-textarea{flex:1;padding:11px 14px;border:2px solid #E0E0E0;border-radius:12px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px;color:#212121}
.comment-textarea:focus{border-color:#2E7D32}
.comment-send-btn{padding:11px 16px;background:#2E7D32;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.comment-send-btn:disabled{background:#BDBDBD;cursor:not-allowed}

/* ── 새 글 쓰기 ── */
.vet-select-list{max-height:240px;overflow-y:auto;border:2px solid #E0E0E0;border-radius:12px;margin-bottom:14px}
.vet-select-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid #F0F0F0;-webkit-tap-highlight-color:transparent}
.vet-select-item:last-child{border-bottom:none}
.vet-select-item:active{background:#F5F5F5}
.vet-select-item.selected{background:#E8F5E9}
.selected-vet-chip{background:#E3F2FD;color:#1565C0;padding:8px 14px;border-radius:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}

/* ── 관리자 ── */
.admin-user-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid #F0F0F0}
.admin-user-name{font-weight:700;font-size:15px;color:#212121}
.admin-user-info{color:#616161;font-size:13px;margin-top:4px}
.admin-actions{display:flex;gap:10px;margin-top:12px}
.admin-btn-approve{flex:1;padding:10px;background:#E8F5E9;color:#2E7D32;border:1.5px solid #A5D6A7;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit;font-size:13px}
.admin-btn-reject{flex:1;padding:10px;background:#FFEBEE;color:#C62828;border:1.5px solid #FFCDD2;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit;font-size:13px}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:48px 16px}
.empty-icon{font-size:48px}
.empty-txt{color:#9E9E9E;font-size:14px;margin-top:12px;line-height:1.75}
.spacer{height:32px}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
         onSnapshot, getDocs, setDoc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

// ╔══════════════════════════════════════╗
// ║  Firebase 설정 (자동 입력됨)         ║
// ╚══════════════════════════════════════╝
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyALVnXknySYP_snXoSRLFEECF2MRtQJ0Yc",
  authDomain:        "chicken-dx.firebaseapp.com",
  projectId:         "chicken-dx",
  storageBucket:     "chicken-dx.firebasestorage.app",
  messagingSenderId: "356503598433",
  appId:             "1:356503598433:web:82cb4969475d53dd9e4120",
};

// 관리자 이메일 (이 이메일로 가입하면 자동 관리자)
const ADMIN_EMAIL = 'admin@chicken-dx.com';

const fbApp = initializeApp(FIREBASE_CONFIG);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

// ── 상태 ──────────────────────────────────────
let S = {
  screen: 'loading',   // loading|login|register|pending|rejected|main|postDetail|newPost
  authUser: null, userDoc: null,
  mainTab: 'board',    // board|vets|myposts|admin|settings
  showVetSelect: false,

  // 로그인 폼
  lPhone:'', lPass:'', lErr:'', lLoading:false,

  // 가입 폼
  rRole:'farmer', rName:'', rPhone:'', rPass:'', rFarm:'', rClinic:'', rErr:'', rLoading:false,

  // 알림
  notifications:[], notifBadge:0, showNotifs:false,
  _lastNotifTime: Date.now(),
  _unsubNotifs:null,

  // 게시글 상세
  selPost:null, comments:[],

  // 새 글
  npTitle:'', npContent:'', npTargetVetId:null, npTargetVetName:'', npPosting:false,

  // 댓글
  newComment:'', commenting:false,

  // 리스너
  _unsubUser:null, _unsubPosts:null, _unsubComments:null, _unsubPending:null,
};

function set(u){ Object.assign(S,u); render(); }

// ── 유틸 ──────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = ts => new Date(ts).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const roleLabel = r => ({farmer:'🌾 농가', vet:'🩺 수의사', admin:'⚙️ 관리자'}[r]||r);
const roleChipCls = r => ({farmer:'chip-green', vet:'chip-blue', admin:'chip-gray'}[r]||'chip-gray');

// ── 알림 ─────────────────────────────────────
async function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') await Notification.requestPermission();
  render();
}

function showBrowserNotif(title, body){
  if(Notification.permission==='granted'){
    try{ new Notification(title, {body, icon:'https://em-content.zobj.net/source/apple/391/chicken_1f414.png'}); }
    catch(e){}
  }
}

async function createNotif({toUserId, fromName, postId, postTitle, type}){
  if(!toUserId || toUserId===S.authUser?.uid) return;
  try{
    await addDoc(collection(db,'notifications'),{
      toUserId, fromName, postId, postTitle, type,
      message: type==='new_post'
        ? `${fromName}님이 질문을 올렸습니다`
        : `${fromName}님이 댓글을 달았습니다`,
      read:false, createdAt:Date.now(),
    });
  }catch(e){ console.error(e); }
}

async function markNotifRead(notifId){
  try{
    await updateDoc(doc(db,'notifications',notifId),{read:true});
  }catch(e){}
}

function startNotifsListener(uid){
  if(S._unsubNotifs){ S._unsubNotifs(); S._unsubNotifs=null; }
  const startTime = Date.now();
  S._unsubNotifs = onSnapshot(collection(db,'notifications'), snap=>{
    const mine = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(n=>n.toUserId===uid && !n.read)
      .sort((a,b)=>b.createdAt-a.createdAt);
    // 새 알림 브라우저 팝업
    mine.filter(n=>n.createdAt>startTime)
      .forEach(n=>showBrowserNotif('🐔 닭 질병 진단', n.message));
    S.notifications = mine;
    S.notifBadge = mine.length;
    render();
  });
}

// 전화번호 → 이메일 변환 (Firebase Auth 내부용)
const phoneToEmail = p => cleanPhone(p) + '@chicken-dx.com';
const cleanPhone   = p => p.replace(/[^0-9]/g,'');

// ── 중복 제출 방지 잠금 ────────────────────────
let _registering = false;
let _posting = false;
let _commenting = false;
let _mainStarted = false;
let _clickBound = false;

onAuthStateChanged(auth, user => {
  if(user){
    S.authUser = user;
    S.lLoading = false;
    S.screen = 'loading';
    render();
    startUserListener(user.uid);
  } else {
    ['_unsubUser','_unsubPosts','_unsubComments','_unsubPending','_unsubNotifs'].forEach(k=>{ if(S[k]){S[k]();S[k]=null;} });
    _mainStarted = false;
    _registering = false;
    Object.assign(S,{authUser:null,userDoc:null,posts:[],vets:[],myPosts:[],pendingUsers:[],
      screen:'login', lLoading:false, rLoading:false});
    render();
  }
});

function startUserListener(uid){
  if(S._unsubUser) S._unsubUser();
  let docChecked = false;
  S._unsubUser = onSnapshot(doc(db,'users',uid), snap=>{
    if(!snap.exists()){
      // 문서가 없으면 3초 후 재확인
      if(!docChecked){
        docChecked = true;
        setTimeout(async ()=>{
          const d = await getDoc(doc(db,'users',uid));
          if(!d.exists()){
            // 문서가 진짜 없으면 로그아웃 후 오류 표시
            await signOut(auth);
            set({screen:'login', lErr:'가입 정보를 찾을 수 없습니다. 다시 가입해 주세요.', lLoading:false});
          }
        }, 3000);
      }
      return;
    }
    docChecked = true;
    const ud = snap.data();
    S.userDoc = ud;
    if(ud.status==='approved'){
      if(S.screen==='loading'||S.screen==='pending'){
        S.screen='main';
        startMainListeners(ud);
      }
    } else if(ud.status==='pending'){
      S.screen='pending';
    } else {
      S.screen='rejected';
    }
    render();
  });
}

function startMainListeners(ud){
  if(_mainStarted) return; // 중복 실행 차단
  _mainStarted = true;
  // 게시글 (최신순 정렬은 클라이언트에서)
  if(S._unsubPosts) S._unsubPosts();
  S._unsubPosts = onSnapshot(collection(db,'posts'), snap=>{
    S.posts = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>b.createdAt - a.createdAt);
    S.myPosts = S.posts.filter(p=>p.authorId===S.authUser?.uid);
    render();
  });
  // 수의사 목록
  refreshVets();
  // 알림 구독
  startNotifsListener(S.authUser.uid);
  // 브라우저 알림 권한 요청
  requestNotifPermission();
  // 관리자: 대기 목록
  if(ud.role==='admin'){
    if(S._unsubPending) S._unsubPending();
    S._unsubPending = onSnapshot(collection(db,'users'), snap=>{
      const seen = new Set();
      S.pendingUsers = snap.docs
        .map(d=>({id:d.id,...d.data()}))
        .filter(u=>{
          if(u.status!=='pending') return false;
          if(seen.has(u.email)) return false;
          seen.add(u.email); return true;
        });
      render();
    });
  }
}

function refreshVets(){
  getDocs(collection(db,'users'))
    .then(snap=>{
      S.vets = snap.docs
        .map(d=>({id:d.id,...d.data()}))
        .filter(u=>u.role==='vet' && u.status==='approved');
      render();
    });
}

async function loadComments(postId){
  if(!postId) return;
  try{
    const snap = await getDocs(collection(db,'comments'));
    S.comments = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(c=>c.postId===postId)
      .sort((a,b)=>a.createdAt - b.createdAt);
    render();
  }catch(e){
    console.error('댓글 로드 오류:', e);
  }
}

function startCommentsListener(postId){
  if(S._unsubComments){ S._unsubComments(); S._unsubComments=null; }
  // 즉시 로드
  loadComments(postId);
  // 실시간 감지 (컬렉션 전체)
  S._unsubComments = onSnapshot(collection(db,'comments'), ()=>{
    loadComments(postId);
  });
}

// ── Auth 액션 ─────────────────────────────────
async function doLogin(){
  if(!S.lPhone.trim()||!S.lPass||S.lLoading) return;
  const phone = cleanPhone(S.lPhone);
  if(phone.length < 10){ set({lErr:'올바른 전화번호를 입력하세요.', lLoading:false}); return; }
  set({lLoading:true, lErr:''});
  try{
    await signInWithEmailAndPassword(auth, phoneToEmail(phone), S.lPass);
  }catch(e){
    const m={
      'auth/user-not-found':'등록된 전화번호가 없습니다.',
      'auth/wrong-password':'비밀번호가 틀렸습니다.',
      'auth/invalid-credential':'전화번호 또는 비밀번호가 올바르지 않습니다.',
      'auth/invalid-email':'전화번호를 확인해 주세요.',
    };
    set({lLoading:false, lErr:m[e.code]||'로그인 오류: '+e.message});
  }
}

async function doRegister(){
  if(_registering) return;
  const {rRole,rName,rPhone,rPass,rFarm,rClinic} = S;
  if(!rName.trim()||!rPhone.trim()||!rPass){ set({rErr:'모든 항목을 입력해주세요.'}); return; }
  if(rRole==='farmer'&&!rFarm.trim()){ set({rErr:'농장명을 입력해주세요.'}); return; }
  if(rRole==='vet'&&!rClinic.trim()){ set({rErr:'병원/기관명을 입력해주세요.'}); return; }
  if(rPass.length<6){ set({rErr:'비밀번호는 6자 이상이어야 합니다.'}); return; }
  const phone = cleanPhone(rPhone);
  if(phone.length<10){ set({rErr:'올바른 전화번호를 입력해주세요.'}); return; }
  const email = phoneToEmail(phone);
  set({rLoading:true, rErr:''});
  _registering = true;
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, rPass);
    const isAdmin = phone === cleanPhone(ADMIN_EMAIL.split('@')[0]) || email === ADMIN_EMAIL;
    const userData = {
      uid:cred.user.uid, name:rName.trim(), phone, email,
      role: isAdmin?'admin':rRole,
      farmName:  rRole==='farmer'?rFarm.trim():'',
      clinicName:rRole==='vet'?rClinic.trim():'',
      status: isAdmin?'approved':'pending',
      createdAt:Date.now(),
    };
    let saved=false;
    for(let i=0;i<3;i++){
      try{ await setDoc(doc(db,'users',cred.user.uid),userData); saved=true; break; }
      catch(err){ if(i===2) throw err; await new Promise(r=>setTimeout(r,1000)); }
    }
    set({rLoading:false});
  }catch(e){
    const m={
      'auth/email-already-in-use':'이미 가입된 전화번호입니다.',
      'auth/weak-password':'비밀번호가 너무 약합니다.',
    };
    _registering=false;
    set({rLoading:false, rErr:m[e.code]||'가입 오류: '+e.message});
  }
}

// ── 게시글 액션 ───────────────────────────────
async function doPost(){
  if(_posting||!S.npTitle.trim()||!S.npContent.trim()) return;
  _posting = true;
  set({npPosting:true});
  try{
    const postRef = await addDoc(collection(db,'posts'),{
      authorId:S.authUser.uid, authorName:S.userDoc.name,
      authorRole:S.userDoc.role, authorFarm:S.userDoc.farmName||'',
      title:S.npTitle.trim(), content:S.npContent.trim(),
      targetVetId:S.npTargetVetId||null, targetVetName:S.npTargetVetName||null,
      commentCount:0, createdAt:Date.now(),
    });
    // 지정 수의사에게 알림
    if(S.npTargetVetId){
      await createNotif({
        toUserId:S.npTargetVetId, fromName:S.userDoc.name,
        postId:postRef.id, postTitle:S.npTitle.trim(), type:'new_post'
      });
    }
    set({npPosting:false,npTitle:'',npContent:'',npTargetVetId:null,npTargetVetName:'',screen:'main',showVetSelect:false});
    _posting = false;
  }catch(e){
    alert('오류: '+e.message);
    _posting = false;
    set({npPosting:false});
  }
}

async function doComment(){
  if(_commenting||!S.newComment.trim()||!S.selPost) return;
  _commenting = true;
  set({commenting:true});
  try{
    await addDoc(collection(db,'comments'),{
      postId:S.selPost.id, authorId:S.authUser.uid,
      authorName:S.userDoc.name, authorRole:S.userDoc.role,
      content:S.newComment.trim(), createdAt:Date.now(),
    });
    await updateDoc(doc(db,'posts',S.selPost.id),{commentCount:(S.selPost.commentCount||0)+1});
    // 게시글 작성자에게 알림 (자신 제외)
    if(S.selPost.authorId !== S.authUser.uid){
      await createNotif({
        toUserId:S.selPost.authorId, fromName:S.userDoc.name,
        postId:S.selPost.id, postTitle:S.selPost.title, type:'new_comment'
      });
    }
    set({commenting:false,newComment:''});
    _commenting = false;
    // 댓글 즉시 새로고침
    loadComments(S.selPost.id);
  }catch(e){
    alert('오류: '+e.message);
    _commenting = false;
    set({commenting:false});
  }
}

// ── 댓글 삭제 ────────────────────────────────
async function doDeleteComment(commentId){
  if(!confirm('이 댓글을 삭제하시겠습니까?')) return;
  try{
    await deleteDoc(doc(db,'comments',commentId));
    const cnt = Math.max(0,(S.selPost?.commentCount||1)-1);
    await updateDoc(doc(db,'posts',S.selPost.id),{commentCount:cnt});
    loadComments(S.selPost.id);
  }catch(e){
    alert('삭제 오류: '+e.message);
  }
}

async function refreshPendingUsers(){
  try{
    const snap = await getDocs(collection(db,'users'));
    const seen = new Set();
    S.pendingUsers = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(u=>{
        if(u.status!=='pending') return false;
        if(seen.has(u.email)) return false;
        seen.add(u.email); return true;
      });
    render();
  }catch(e){ console.error(e); }
}

// ── 관리자 액션 ───────────────────────────────
async function doDeletePost(postId){
  if(!confirm('이 게시글을 삭제하시겠습니까?\n댓글도 함께 삭제됩니다.')) return;
  try{
    // 댓글 함께 삭제
    const commentsSnap = await getDocs(collection(db,'comments'));
    const toDelete = commentsSnap.docs.filter(d=>d.data().postId===postId);
    await Promise.all(toDelete.map(d=>deleteDoc(doc(db,'comments',d.id))));
    // 게시글 삭제
    await deleteDoc(doc(db,'posts',postId));
    // 목록으로 돌아가기
    if(S._unsubComments){ S._unsubComments(); S._unsubComments=null; }
    set({screen:'main', selPost:null, comments:[]});
  }catch(e){
    alert('삭제 오류: '+e.message);
  }
}
async function doApprove(uid, approve){
  if(!uid){ alert('사용자 ID를 찾을 수 없습니다.'); return; }
  try{
    await updateDoc(doc(db,'users',uid),{
      status: approve ? 'approved' : 'rejected',
      reviewedAt: Date.now(),
    });
    if(approve) refreshVets();
    await refreshPendingUsers();
  }catch(e){
    alert('오류: '+e.message);
  }
}

  document.getElementById('root').innerHTML = buildHTML();

function buildHTML(){
  switch(S.screen){
    case 'loading':   return rLoading();
    case 'login':     return rAuth('login');
    case 'register':  return rAuth('register');
    case 'pending':   return rStatus('pending');
    case 'rejected':  return rStatus('rejected');
    case 'postDetail':return rMain()+rPostDetail();
    case 'newPost':   return rMain()+rNewPost();
    default:          return rMain();
  }
}

        <button class="admin-btn-reject" data-a="reject" data-uid="${u.id}">❌ 거절</button>
      </div>
    </div>`).join('')}`;
}

// ── 내 정보 탭 ────────────────────────────────
function rSettings(){
  const ud=S.userDoc||{};
  return`
  <div class="card" style="margin-bottom:14px">
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:52px">${ud.role==='farmer'?'🌾':'🩺'}</div>
      <div style="font-weight:700;font-size:18px;margin-top:10px">${esc(ud.name)}</div>
      <div style="margin-top:6px"><span class="chip ${roleChipCls(ud.role)}">${roleLabel(ud.role)}</span></div>
      ${ud.farmName?`<div style="color:#616161;font-size:13px;margin-top:8px">🌾 ${esc(ud.farmName)}</div>`:''}
      ${ud.clinicName?`<div style="color:#616161;font-size:13px;margin-top:8px">🏥 ${esc(ud.clinicName)}</div>`:''}
      <div style="color:#9E9E9E;font-size:12px;margin-top:6px">📱 ${esc(ud.phone||ud.email)}</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-weight:700;font-size:14px;color:#37474F;margin-bottom:10px">🔔 푸시 알림</div>
    ${'Notification' in window
      ? Notification.permission==='granted'
        ? `<p style="color:#2E7D32;font-size:13px">✅ 알림이 허용되어 있습니다.</p>`
        : `<button data-a="req-notif-perm" class="btn btn-green" style="font-size:14px;padding:11px">알림 허용하기</button>`
      : `<p style="color:#9E9E9E;font-size:13px">이 브라우저는 알림을 지원하지 않습니다.</p>`}
  </div>
  <button class="btn btn-red" data-a="logout" style="margin-top:8px">로그아웃</button>`;
}

// ── 게시글 상세 오버레이 ──────────────────────
function rPostDetail(){
  const p=S.selPost; if(!p) return '';
  return`
  <div class="overlay">
    <div class="ov-hdr">
      <button class="ov-back" data-a="close-post">←</button>
      <span class="ov-title">게시글</span>
      ${(S.userDoc?.uid===p.authorId || S.userDoc?.role==='admin')
        ?`<button data-a="delete-post" data-id="${p.id}"
            style="margin-left:auto;background:#FFEBEE;color:#C62828;border:1.5px solid #FFCDD2;
                   border-radius:10px;padding:6px 12px;font-size:13px;font-weight:600;
                   cursor:pointer;font-family:inherit">
            🗑️ 삭제
          </button>`
        :''}
    </div>
    <div class="ov-scroll" style="padding-bottom:80px">
      ${p.targetVetName?`<div class="target-vet" style="margin-bottom:12px">🩺 ${esc(p.targetVetName)} 선생님께</div>`:''}
      <div class="post-detail-title">${esc(p.title)}</div>
      <div class="post-detail-meta">
        <span class="chip ${roleChipCls(p.authorRole)}">${roleLabel(p.authorRole)}</span>
        <span style="font-weight:600;font-size:13px">${esc(p.authorName)}</span>
        ${p.authorFarm?`<span style="font-size:12px;color:#9E9E9E">${esc(p.authorFarm)}</span>`:''}
        <span class="post-date">${fmtDate(p.createdAt)}</span>
      </div>
      <div class="post-detail-content">${esc(p.content)}</div>
      <div class="divider"></div>
      <div class="comment-count">💬 댓글 ${S.comments.length}개</div>
      ${S.comments.length===0?`<div style="text-align:center;padding:20px;color:#9E9E9E;font-size:13px">첫 댓글을 작성해보세요!</div>`:''}
      ${S.comments.map(c=>`
      <div class="comment-item">
        <div class="comment-author">
          <span class="chip ${roleChipCls(c.authorRole)}" style="font-size:11px">${roleLabel(c.authorRole)}</span>
          <span class="comment-name">${esc(c.authorName)}</span>
          <span class="comment-date">${fmtDate(c.createdAt)}</span>
          ${(S.userDoc?.uid===c.authorId || S.userDoc?.role==='admin')
            ?`<button data-a="delete-comment" data-id="${c.id}"
                style="margin-left:auto;background:none;border:none;color:#BDBDBD;
                       cursor:pointer;font-size:13px;padding:2px 6px">🗑️</button>`
            :''}
        </div>
        <div class="comment-content">${esc(c.content)}</div>
      </div>`).join('')}
      <div class="spacer"></div>
    </div>
    <div class="comment-input-area">
      <textarea class="comment-textarea" id="comment-input" rows="1"
        placeholder="댓글을 입력하세요..." ${S.commenting?'disabled':''}>${esc(S.newComment)}</textarea>
      <button class="comment-send-btn" data-a="do-comment" ${(S.newComment.trim()&&!S.commenting)?'':'disabled'}>
        ${S.commenting?'..':'전송'}
      </button>
    </div>
  </div>`; }

// ── 새 글 쓰기 오버레이 ───────────────────────
function rNewPost(){
  return`
  <div class="overlay">
    <div class="ov-hdr">
      <button class="ov-back" data-a="close-new-post">←</button>
      <span class="ov-title">✏️ 새 글 작성</span>
    </div>
    <div class="ov-scroll">
      <div class="form-row">
        <label class="lbl">수의사 선택 <span style="color:#9E9E9E;font-weight:400;font-size:12px">(선택사항)</span></label>
        ${S.npTargetVetId
          ?`<div class="selected-vet-chip" data-a="clear-vet">
              🩺 ${esc(S.npTargetVetName)} 선생님께 질문 <span>✕</span>
            </div>`
          :`<button class="btn btn-gray" data-a="toggle-vet-select" style="font-size:13px;padding:10px;margin-bottom:10px">
              🩺 수의사 선택하기
            </button>`}
        ${S.showVetSelect?`
        <div class="vet-select-list">
          <div class="vet-select-item" data-a="select-vet" data-id="" data-name="">
            <span style="color:#9E9E9E;font-size:13px">선택 안 함 (전체 공개)</span>
          </div>
          ${S.vets.map(v=>`
          <div class="vet-select-item ${S.npTargetVetId===v.id?'selected':''}"
            data-a="select-vet" data-id="${v.id}" data-name="${esc(v.name)}">
            <strong>${esc(v.name)}</strong> 선생님
            <span style="color:#9E9E9E;font-size:12px;margin-left:6px">${esc(v.clinicName)}</span>
          </div>`).join('')}
        </div>`:''}
      </div>
      <div class="form-row">
        <label class="lbl">제목 <span style="color:#E53935">*</span></label>
        <input class="inp" id="np-title" type="text" placeholder="제목을 입력하세요" value="${esc(S.npTitle)}"/>
      </div>
      <div class="form-row">
        <label class="lbl">내용 <span style="color:#E53935">*</span></label>
        <textarea class="inp" id="np-content" rows="8"
          style="resize:vertical;line-height:1.65;min-height:180px"
          placeholder="증상이나 질문을 자세히 작성해주세요.">${esc(S.npContent)}</textarea>
      </div>
      <button class="btn btn-green" data-a="do-post" ${(S.npTitle.trim()&&S.npContent.trim()&&!S.npPosting)?'':'disabled'}>
        ${S.npPosting?`<div class="loading-row"><div class="spin"></div><span>등록 중...</span></div>`:'게시글 등록하기'}
      </button>
      <div class="spacer"></div>
    </div>
  </div>`; }

// ── 이벤트 바인딩 ─────────────────────────────
function bindEvents(){
  // 클릭 리스너는 최초 1회만 등록
  if(!_clickBound){
    _clickBound = true;
    document.getElementById('root').addEventListener('click', async e=>{
      const el=e.target.closest('[data-a]'); if(!el) return;
      const a=el.dataset.a;

      if     (a==='auth-tab')    set({screen:el.dataset.tab,lErr:'',rErr:''});
      else if(a==='set-role')    set({rRole:el.dataset.role});
      else if(a==='do-login')   { syncLoginForm(); await doLogin(); }
      else if(a==='do-register'){ syncRegisterForm(); await doRegister(); }
      else if(a==='logout')     { _mainStarted=false; await signOut(auth); }
      else if(a==='tab'){
        set({mainTab:el.dataset.tab});
        if(el.dataset.tab==='admin') refreshPendingUsers();
      }
      else if(a==='refresh-admin') refreshPendingUsers();
      else if(a==='go-new-post') set({screen:'newPost',npTitle:'',npContent:'',npTargetVetId:null,npTargetVetName:'',showVetSelect:false});
      else if(a==='close-new-post') set({screen:'main',showVetSelect:false});
      else if(a==='toggle-vet-select') set({showVetSelect:!S.showVetSelect});
      else if(a==='select-vet') {
        set({npTargetVetId:el.dataset.id||null,npTargetVetName:el.dataset.name||'',showVetSelect:false});
      }
      else if(a==='clear-vet')  set({npTargetVetId:null,npTargetVetName:'',showVetSelect:false});
      else if(a==='do-post')    { syncNewPostForm(); await doPost(); }
      else if(a==='open-post')  {
        const p=S.posts.find(x=>x.id===el.dataset.id);
        if(p){ set({selPost:p,screen:'postDetail',comments:[],newComment:''}); startCommentsListener(p.id); }
      }
      else if(a==='close-post') {
        if(S._unsubComments){S._unsubComments();S._unsubComments=null;}
        set({screen:'main',selPost:null,comments:[]});
      }
      else if(a==='delete-post')    await doDeletePost(el.dataset.id);
      else if(a==='delete-comment') await doDeleteComment(el.dataset.id);
      else if(a==='do-comment') { syncComment(); await doComment(); }
      else if(a==='open-notif'){
        await markNotifRead(el.dataset.id);
        const p=S.posts.find(x=>x.id===el.dataset.postid);
        if(p){ set({selPost:p,screen:'postDetail',comments:[],newComment:'',mainTab:'board'}); startCommentsListener(p.id); }
      }
      else if(a==='read-all'){
        S.notifications.forEach(n=>markNotifRead(n.id));
      }
      else if(a==='req-notif-perm') await requestNotifPermission();
      else if(a==='approve')    await doApprove(el.dataset.uid,true);
      else if(a==='reject')     await doApprove(el.dataset.uid,false);
      else if(a==='ask-vet')    {
        set({screen:'newPost',npTargetVetId:el.dataset.id,npTargetVetName:el.dataset.name,
             npTitle:'',npContent:'',showVetSelect:false,mainTab:'board'});
      }
    });
  }

  // 엔터키 로그인
  document.getElementById('l-pass')?.addEventListener('keydown',e=>{ if(e.key==='Enter'){syncLoginForm();doLogin();} });

  // 댓글 textarea 동기화
  const ca=document.getElementById('comment-input');
  if(ca){ ca.addEventListener('input',e=>{
    S.newComment=e.target.value;
    const b=document.querySelector('[data-a="do-comment"]');
    if(b) b.disabled=!e.target.value.trim()||S.commenting;
  });}

  // 새 글 입력 동기화 + 버튼 활성화
  const npTitle = document.getElementById('np-title');
  const npContent = document.getElementById('np-content');
  function updatePostBtn(){
    const b = document.querySelector('[data-a="do-post"]');
    if(b) b.disabled = !S.npTitle.trim() || !S.npContent.trim() || S.npPosting;
  }
  if(npTitle){ npTitle.addEventListener('input',e=>{ S.npTitle=e.target.value; updatePostBtn(); }); }
  if(npContent){ npContent.addEventListener('input',e=>{ S.npContent=e.target.value; updatePostBtn(); }); }
}

function syncLoginForm(){
  S.lPhone=document.getElementById('l-phone')?.value||S.lPhone;
  S.lPass=document.getElementById('l-pass')?.value||S.lPass;
}
function syncRegisterForm(){
  S.rName=document.getElementById('r-name')?.value||S.rName;
  S.rPhone=document.getElementById('r-phone')?.value||S.rPhone;
  S.rPass=document.getElementById('r-pass')?.value||S.rPass;
  const org=document.getElementById('r-org')?.value||'';
  if(S.rRole==='farmer') S.rFarm=org; else S.rClinic=org;
}
function syncNewPostForm(){
  S.npTitle=document.getElementById('np-title')?.value||S.npTitle;
  S.npContent=document.getElementById('np-content')?.value||S.npContent;
}
function syncComment(){
  S.newComment=document.getElementById('comment-input')?.value||S.newComment;
}

render();
</script>
